name: Release & Publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC) — no NPM_PUBLISH_TOKEN needed.
    # The package on npm must list this workflow as a trusted publisher.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm CLI (Trusted Publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        working-directory: web
        run: bun install

      - name: Build frontend
        working-directory: web
        run: bun run build
        env:
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST || 'https://us.i.posthog.com' }}

      - name: Verify dist exists
        working-directory: web
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html missing" && exit 1)
          ls -la dist/

      - name: Verify package contents
        working-directory: web
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: web
        run: npm publish --access public --provenance

  # Docker image publishing (upstream pushed to stangirard/the-companion) is
  # not used by this fork. If we want our own images later, add a job here
  # that pushes to hellcodergit/companion on Docker Hub or to ghcr.io.
